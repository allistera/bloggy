version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # Remove this ceiling when @typescript-eslint/parser supports TypeScript 6.1+.
      - dependency-name: typescript
        versions:
          - '>=6.1.0'
    groups:
      production-deps:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-deps:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
